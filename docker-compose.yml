services:
  backend:
    build:
      context: ./backend
    container_name: oms-backend
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000
    container_name: oms-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"
